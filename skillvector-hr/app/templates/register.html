{% extends "layout.html" %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-page-wrapper">
    <div class="auth-header-logo">
        <h1>Skillvector</h1>
        <p>Talent Management System</p>
    </div>

    <div class="auth-card">
        <div class="auth-card-header">
            <h2>Create Account</h2>
            <p>Join the future of HR management</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="name">Full Name</label>
                <div class="input-with-icon">
                    <span class="icon"><i class="fas fa-user"></i></span>
                    <input type="text" name="name" placeholder="John Doe">
                </div>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-with-icon">
                    <span class="icon"><i class="fas fa-id-badge"></i></span>
                    <input type="text" name="username" required placeholder="jdoe">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-with-icon">
                    <span class="icon"><i class="fas fa-envelope"></i></span>
                    <input type="email" name="email" required placeholder="john@example.com">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <span class="icon"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" required placeholder="Create a strong password">
                </div>
            </div>

            <button type="submit" class="btn btn-dark btn-block">Register</button>
        </form>

        <div class="auth-footer-links">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
        </div>
    </div>

    <div class="auth-page-footer">
        <p>Secure HR Management Platform</p>
        <p>&copy; 2024 SkillVector. All rights reserved.</p>
    </div>
</div>
{% endblock %}
